name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86-64 GCC
            os: ubuntu-latest
            cxx: g++
            tsan: true
          - name: Linux x86-64 Clang
            os: ubuntu-latest
            cxx: clang++
            tsan: true
            asan: true
          - name: Linux ARM64 GCC
            os: ubuntu-24.04-arm
            cxx: g++
            tsan: true
          - name: Linux ARM64 Clang
            os: ubuntu-24.04-arm
            cxx: clang++
            tsan: true
          - name: macOS ARM64 Apple Clang
            os: macos-latest
            cxx: c++
            tsan: true
          - name: macOS x86-64 Apple Clang
            os: macos-15-intel
            cxx: c++
            tsan: true
    steps:
      - uses: actions/checkout@v5

      - name: Unit tests (C++17)
        run: make clean && make test CXX=${{ matrix.cxx }} STD=c++17

      - name: Unit tests (C++20)
        run: make clean && make test CXX=${{ matrix.cxx }} STD=c++20

      - name: Demo
        run: make demo CXX=${{ matrix.cxx }} STD=c++20

      - name: Throughput (informational)
        run: |
          set -o pipefail
          make build/bench build/signal_slot_demo CXX=${{ matrix.cxx }}
          {
            echo "## Throughput - ${{ matrix.name }}"
            echo ""
            ./build/bench --markdown
            echo ""
            ./build/signal_slot_demo --markdown
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Demos (self-verifying)
        run: |
          set -o pipefail
          make build/capture_replay_demo build/pcap_replay_demo build/taskflow_style_demo CXX=${{ matrix.cxx }}
          {
            ./build/capture_replay_demo --markdown
            echo ""
            ./build/pcap_replay_demo --markdown
            echo ""
            ./build/taskflow_style_demo --markdown
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: ThreadSanitizer
        if: ${{ matrix.tsan }}
        run: make tsan CXX=${{ matrix.cxx }} STD=c++20

      - name: Address + UB Sanitizers
        if: ${{ matrix.asan }}
        run: make asan CXX=${{ matrix.cxx }} STD=c++20

  cmake:
    name: CMake ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -B build-cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-cmake --config Release

      - name: Test
        run: ctest --test-dir build-cmake -C Release --output-on-failure

      - name: Throughput (informational)
        shell: bash
        run: |
          set -o pipefail
          run_exe() {
            if [ -x "build-cmake/Release/$1.exe" ]; then "build-cmake/Release/$1.exe" --markdown
            elif [ -x "build-cmake/Release/$1" ]; then "build-cmake/Release/$1" --markdown
            else "build-cmake/$1" --markdown
            fi
          }
          {
            echo "## Throughput - CMake ${{ matrix.os }}"
            echo ""
            run_exe ts_moveables_bench
            echo ""
            run_exe ts_moveables_signal_slot_demo
            echo ""
            run_exe ts_moveables_capture_replay_demo
            echo ""
            run_exe ts_moveables_pcap_replay_demo
            echo ""
            run_exe ts_moveables_taskflow_style_demo
          } | tee -a "$GITHUB_STEP_SUMMARY"

  msvc:
    name: Windows x86-64 MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Unit tests (C++17 and C++20)
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do call "%%i\VC\Auxiliary\Build\vcvars64.bat"
          cl /nologo /std:c++17 /EHsc /W4 /O2 tests\*.cpp /Fe:tests17.exe || exit /b 1
          tests17.exe || exit /b 1
          cl /nologo /std:c++20 /EHsc /W4 /O2 tests\*.cpp /Fe:tests20.exe || exit /b 1
          tests20.exe || exit /b 1
